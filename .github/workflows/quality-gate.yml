name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Typecheck, build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: API tests
        run: pnpm test

      - name: Web navigation tests
        run: pnpm test:web-navigation

      - name: Route + navigation smoke (ürün öncesi kapı)
        run: pnpm smoke:routes && pnpm smoke:navigation

      - name: Dependency audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

      - name: Upload quality logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-logs
          path: |
            .turbo/**/*.log
            apps/web/.next/**/*.log
            apps/web/.runtime-next/**/*.log
          if-no-files-found: ignore
