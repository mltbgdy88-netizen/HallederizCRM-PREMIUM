name: ADAWALL Virtual Flagship CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'projects/adawall-virtual-flagship/app/**'
      - '.github/workflows/adawall-virtual-flagship-ci.yml'
  pull_request:
    paths:
      - 'projects/adawall-virtual-flagship/app/**'
      - '.github/workflows/adawall-virtual-flagship-ci.yml'

jobs:
  app-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/adawall-virtual-flagship/app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projects/adawall-virtual-flagship/app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
