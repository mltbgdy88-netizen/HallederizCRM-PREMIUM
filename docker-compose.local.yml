services:
  postgres:
    image: postgres:16-alpine
    container_name: hallederizcrm-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hallederiz
      POSTGRES_PASSWORD: hallederiz_dev
      POSTGRES_DB: hallederizcrm
    volumes:
      - hallederizcrm_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hallederizcrm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - hallederizcrm_redisdata:/data

  api:
    image: node:20-alpine
    container_name: hallederizcrm-api
    restart: unless-stopped
    working_dir: /app
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
      - hallederizcrm_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      PERSISTENCE_MODE: demo
      DEMO_AUTH_ENABLED: "true"
      LOCAL_PILOT_AUTH_ENABLED: "false"
      DATABASE_URL: postgres://hallederiz:hallederiz_dev@postgres:5432/hallederizcrm
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: sh -lc "corepack enable && pnpm install && pnpm --filter @hallederiz/api dev"

  web:
    image: node:20-alpine
    container_name: hallederizcrm-web
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - hallederizcrm_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_ENABLE_DEMO_AUTH: "true"
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api
    command: sh -lc "corepack enable && pnpm install && pnpm --filter @hallederiz/web dev"

volumes:
  hallederizcrm_pgdata:
  hallederizcrm_redisdata:
  hallederizcrm_node_modules:

